{% extends "base.html" %}
{% block title %}Register | GlucoRisk{% endblock %}
{% block content %}

<div class="auth-wrap">
  <div class="auth-card fade-in">
    <div class="auth-logo"><i class="bi bi-shield-plus"></i> GlucoRisk</div>
    <div class="auth-sub">Create your secure monitoring account</div>

    <form method="POST" action="{{ url_for('register') }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
      <div class="mb-4">
        <label class="form-label" for="username">Choose Username</label>
        <div class="input-group">
          <span class="input-group-text" style="background: rgba(0,0,0,0.2); border: 1px solid var(--border); border-right: none; color: var(--muted);"><i class="bi bi-person-badge"></i></span>
          <input type="text" class="form-control" id="username" name="username"
                 placeholder="Enter a unique username" style="border-left: none;" required autofocus>
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label" for="password">Set Password</label>
        <div class="input-group">
          <span class="input-group-text" style="background: rgba(0,0,0,0.2); border: 1px solid var(--border); border-right: none; color: var(--muted);"><i class="bi bi-key-fill"></i></span>
          <input type="password" class="form-control" id="password" name="password"
                 placeholder="Min 6 characters" style="border-left: none;" required minlength="6">
        </div>
      </div>
      
      <button type="submit" class="btn-predict mt-2"><i class="bi bi-person-plus"></i> Create Account</button>
    </form>

    <div class="text-center mt-5" style="color: var(--muted); font-size: 13px;">
      Already have an account? <a href="{{ url_for('login') }}" class="auth-link ml-1">Sign in here</a>
    </div>
  </div>
</div>

{% endblock %}
