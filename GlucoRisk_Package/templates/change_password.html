{% extends "base.html" %}
{% block title %}Change Password | GlucoRisk{% endblock %}
{% block content %}

<div class="row justify-content-center fade-in">
  <div class="col-md-6 col-lg-5">
    <div class="card-dark" style="border-top: 3px solid var(--accent);">
      <h2 class="page-title text-center mb-4"><i class="bi bi-key-fill text-warning me-2"></i>Change Password</h2>
      <div class="page-sub text-center mb-4" style="font-size: 12px; color: var(--muted);">
        Requires: 8+ characters, 1 uppercase, 1 digit, 1 special character (!@#$%^&*)
      </div>
      
      <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        
        <div class="mb-3">
          <label class="form-label" style="font-size: 12px; text-transform: uppercase; color: var(--muted);">Current Password</label>
          <input type="password" class="form-control" name="current_password" required
                 style="background: #1a1a2e; border: 1px solid #333; color: var(--text);">
        </div>
        
        <div class="mb-3">
          <label class="form-label" style="font-size: 12px; text-transform: uppercase; color: var(--muted);">New Password</label>
          <input type="password" class="form-control" name="new_password" required minlength="8"
                 pattern="(?=.*[A-Z])(?=.*\d)(?=.*[!@#$%^&*()_+\-=]).{8,}"
                 style="background: #1a1a2e; border: 1px solid #333; color: var(--text);">
        </div>
        
        <div class="mb-4">
          <label class="form-label" style="font-size: 12px; text-transform: uppercase; color: var(--muted);">Confirm New Password</label>
          <input type="password" class="form-control" name="confirm_password" required
                 style="background: #1a1a2e; border: 1px solid #333; color: var(--text);">
        </div>
        
        <button type="submit" class="btn btn-primary w-100 mb-3">Update Password</button>
        <a href="{{ url_for('dashboard') }}" class="btn btn-outline-light w-100">Cancel</a>
      </form>
    </div>
  </div>
</div>

{% endblock %}
